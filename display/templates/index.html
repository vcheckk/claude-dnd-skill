<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="dnd-token" content="{{ lan_token }}">
<title>DnD — Dungeon Master</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon"  href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32"  href="/icons/app_icon_32.png">
<link rel="apple-touch-icon" sizes="180x180"      href="/icons/app_icon_180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/app_icon_192.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    color: #d4c4a0;
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 20px;
    line-height: 1.85;
  }

  /* ── Background gradient layers (A/B crossfade) ── */
  .bg-layer {
    position: fixed; inset: 0;
    transition: opacity 2.5s ease;
    pointer-events: none;
    z-index: 0;
  }
  #bg-a { opacity: 1; }
  #bg-b { opacity: 0; }

  /* ── Sky canvas (sun/moon/clouds/stars — driven by world_time) ── */
  #sky {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 42vh;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Particle canvas ── */
  #particles {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Vignette ── */
  #vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 45%,
      transparent 30%,
      rgba(0,0,0,0.55) 70%,
      rgba(0,0,0,0.88) 100%);
    pointer-events: none;
    z-index: 2;
  }

  /* ── Decorative border frame ── */
  #frame {
    position: fixed; inset: 16px;
    border: 1px solid rgba(180, 140, 60, 0.25);
    border-radius: 2px;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.4),
      0 0 30px rgba(0,0,0,0.7);
    pointer-events: none;
    z-index: 3;
  }
  /* Corner accents */
  #frame::before, #frame::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: rgba(180, 140, 60, 0.5);
    border-style: solid;
  }
  #frame::before {
    top: -1px; left: -1px;
    border-width: 2px 0 0 2px;
  }
  #frame::after {
    bottom: -1px; right: -1px;
    border-width: 0 2px 2px 0;
  }

  /* ── Scene indicator ── */
  #scene-indicator {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(180, 140, 60, 0.6);
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.8s ease;
    white-space: nowrap;
  }
  #scene-indicator.changing {
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  /* ── Text scroll area ── */
  #text-scroll {
    position: fixed; inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 72px 18vw 80px 230px;  /* left: sidebar width + gap */
    z-index: 4;
    scroll-behavior: smooth;
    transition: padding-left 0.4s ease;
    /* Hide scrollbar but keep scroll */
    scrollbar-width: none;
  }
  #text-scroll::-webkit-scrollbar { display: none; }
  #text-scroll.sidebar-hidden { padding-left: 60px; }

  /* ── Text content ── */
  #text-content {
    max-width: 820px;
    margin: 0 auto;
    transition: opacity 0.35s ease;
  }

  .dm-block {
    margin-bottom: 2.2em;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .dm-block p {
    color: #d4c4a0;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  /* Emphasis inside narration — warm amber, upright (italic is hard to read at distance) */
  .dm-block p em {
    color: #c8b080;
    font-style: normal;
  }

  /* Markdown tables inside narration */
  .dm-block table.dm-table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.8em 0 1em;
    font-size: 0.92em;
    color: #d4c4a0;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }
  .dm-block table.dm-table th {
    text-align: left;
    padding: 0.45em 0.9em;
    background: rgba(80, 55, 30, 0.35);
    color: rgba(230, 210, 170, 0.95);
    font-weight: 600;
    border-bottom: 1px solid rgba(180, 140, 90, 0.45);
  }
  .dm-block table.dm-table td {
    padding: 0.4em 0.9em;
    border-bottom: 1px solid rgba(180, 140, 90, 0.18);
    vertical-align: top;
  }
  .dm-block table.dm-table tr:last-child td {
    border-bottom: none;
  }
  .dm-block table.dm-table strong {
    color: #ffffff;
  }

  /* ── Player action blocks ── */
  .player-block {
    margin-bottom: 2em;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards;
    border-left: 2px solid rgba(120, 175, 210, 0.3);
    padding-left: 1.2em;
  }

  .player-name {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(130, 185, 215, 0.75);
    margin-bottom: 0.45em;
  }

  .player-block p {
    color: #94b8cc;
    font-size: 0.92em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  .player-block p em {
    font-style: italic;
  }

  /* ── Player action intent block ── */
  .action-block {
    margin-bottom: 1.4em;
    opacity: 0;
    animation: fadeIn 0.4s ease forwards;
    display: flex;
    align-items: flex-start;
    gap: 0.6em;
  }

  .action-tag {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(130, 185, 215, 0.5);
    white-space: nowrap;
    padding-top: 0.15em;
    flex-shrink: 0;
  }

  .action-block p {
    color: rgba(148, 184, 204, 0.65);
    font-size: 0.82em;
    font-style: italic;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    margin: 0;
    line-height: 1.5;
    border-left: 1px solid rgba(120, 175, 210, 0.18);
    padding-left: 0.7em;
  }

  /* ── NPC dialogue blocks ── */
  .npc-block {
    margin-bottom: 2em;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards;
    border-left: 2px solid rgba(200, 160, 64, 0.35);
    padding-left: 1.2em;
  }

  .npc-name {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(200, 160, 64, 0.8);
    margin-bottom: 0.45em;
  }

  .npc-block p {
    color: #ffffff;
    font-style: normal;
    font-size: 0.95em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }
  .npc-block p em {
    font-style: normal;
    color: #ffffff;
  }

  /* ── Dice result blocks ── */
  .dice-block {
    margin: -1em 0 1em;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards;
    text-align: center;
  }

  .dice-result {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: #c8a040;
    text-shadow: 0 0 10px rgba(200, 160, 64, 0.3);
    padding: 0.25em 1.2em;
    border: 1px solid rgba(200, 160, 64, 0.18);
    border-radius: 1px;
  }

  /* ── Tutor / learning mode hint blocks ── */
  .tutor-block {
    margin-bottom: 2em;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards;
    border: 1px solid rgba(160, 200, 160, 0.22);
    border-left: 2px solid rgba(130, 190, 130, 0.5);
    border-radius: 2px;
    background: rgba(20, 40, 20, 0.45);
    padding: 0.7em 1.1em 0.75em;
  }

  .tutor-header {
    display: flex;
    align-items: center;
    gap: 0.5em;
    cursor: pointer;
    user-select: none;
    margin-bottom: 0;
  }

  .tutor-icon {
    font-size: 10px;
    color: rgba(130, 190, 130, 0.75);
    flex-shrink: 0;
  }

  .tutor-label {
    font-family: 'Cinzel', serif;
    font-size: 8.5px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(130, 190, 130, 0.65);
    flex: 1;
  }

  .tutor-chevron {
    font-size: 9px;
    color: rgba(130, 190, 130, 0.45);
    transition: transform 0.2s ease;
  }
  .tutor-block.expanded .tutor-chevron { transform: rotate(180deg); }

  .tutor-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.28s ease, opacity 0.2s ease, margin-top 0.2s ease;
    opacity: 0;
    margin-top: 0;
  }
  .tutor-block.expanded .tutor-body {
    max-height: 600px;
    opacity: 1;
    margin-top: 0.55em;
  }

  .tutor-body p {
    font-size: 0.88em;
    color: rgba(180, 220, 180, 0.82);
    font-style: italic;
    line-height: 1.7;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  }

  /* Consequence / warning variant */
  .tutor-block.tutor-warning {
    border-color: rgba(200, 140, 60, 0.25);
    border-left-color: rgba(200, 140, 60, 0.6);
    background: rgba(40, 24, 8, 0.5);
  }
  .tutor-block.tutor-warning .tutor-icon,
  .tutor-block.tutor-warning .tutor-label,
  .tutor-block.tutor-warning .tutor-chevron { color: rgba(200, 150, 70, 0.7); }
  .tutor-block.tutor-warning .tutor-body p  { color: rgba(230, 190, 130, 0.82); }

  /* DM processing indicator — shown between queue consumed and first narration */
  #dm-processing-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 4px 10px 2px;
    opacity: 0;
    animation: proc-fadein 0.4s ease 0.15s forwards;
  }
  @keyframes proc-fadein {
    to { opacity: 1; }
  }
  #dm-processing-indicator .proc-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(160, 120, 60, 0.55);
    animation: proc-pulse 1.2s ease-in-out infinite;
  }
  #dm-processing-indicator .proc-dot:nth-child(2) { animation-delay: 0.2s; }
  #dm-processing-indicator .proc-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes proc-pulse {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.35; }
    40%           { transform: scale(1.15); opacity: 0.85; }
  }

  /* Session divider */
  .divider {
    text-align: center;
    color: rgba(180, 140, 60, 0.4);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    margin: 2em 0;
    user-select: none;
  }
  .divider::before, .divider::after {
    content: '— ';
  }

  /* Cursor blink */
  .typing-cursor::after {
    content: '';
    display: inline-block;
    width: 2px;
    height: 0.85em;
    background: rgba(180, 140, 60, 0.8);
    vertical-align: -0.05em;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* Bottom fade gradient to hint there's more */
  #bottom-fade {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    pointer-events: none;
    z-index: 4;
  }

  /* ══════════════════════════════════════════════════════════
     CHARACTER SIDEBAR
     Fixed left column. Compact player cards stack vertically.
     Ability scores shown only when there is exactly 1 player.
     ══════════════════════════════════════════════════════════ */

  /* ── Sidebar hide toggle ── */
  #sidebar-toggle {
    position: fixed;
    left: 28px;
    top: 94px;
    z-index: 8;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(180,140,60,0.4);
    padding: 2px 6px;
    transition: color 0.3s ease;
    display: none;  /* shown only when sidebar has data */
  }
  #sidebar-toggle:hover { color: rgba(180,140,60,0.8); }
  #sidebar-toggle.visible { display: block; }

  #sidebar {
    position: fixed;
    left: 0;
    top: 60px;
    bottom: 28px;
    width: 210px;
    z-index: 6;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    background: linear-gradient(to right, rgba(0,0,0,0.6) 70%, transparent);
    border-right: 1px solid rgba(180,140,60,0.15);
    padding: 54px 12px 16px 28px;
    opacity: 0;
    transition: opacity 0.7s ease, transform 0.4s ease;
    transform: translateX(0);
  }
  #sidebar.has-data { opacity: 1; }
  #sidebar.hidden {
    transform: translateX(-210px);
    opacity: 0;
    pointer-events: none;
  }
  #sidebar::-webkit-scrollbar { display: none; }

  /* ── Player card ── */
  .sb-player {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(180,140,60,0.1);
  }
  .sb-player:last-of-type { border-bottom: none; margin-bottom: 0; }

  .sb-name {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(200,165,80,0.9);
    margin-bottom: 2px;
    padding-right: 34px;
  }
  .sb-identity {
    font-size: 10px;
    color: rgba(200,185,150,0.5);
    line-height: 1.4;
    margin-bottom: 8px;
    padding-right: 34px;
  }

  /* ── HP row ── */
  .sb-hp-row {
    display: flex;
    align-items: center;
    margin-bottom: 3px;
  }
  .sb-label {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(180,140,60,0.5);
    margin-left: 5px;
  }
  .sb-hp-nums {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: rgba(220,200,160,0.75);
    margin-left: auto;
  }
  .sb-bar-track {
    height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 3px;
  }
  .sb-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease, background-color 0.6s ease;
  }
  .sb-hp-temp-row {
    font-size: 9px;
    color: rgba(120,180,230,0.6);
    margin-bottom: 3px;
  }

  /* ── XP row ── */
  .sb-xp-row {
    display: flex;
    align-items: center;
    margin-top: 4px;
    margin-bottom: 2px;
  }
  .sb-xp-nums {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: rgba(180,140,60,0.55);
    margin-left: auto;
  }
  .sb-xp-bar { background: rgba(180,140,60,0.4); }

  /* ── Quick stats (AC · Init · Speed) ── */
  .sb-quick-stats {
    margin-top: 6px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(200,185,150,0.55);
    line-height: 1.8;
  }
  .sb-quick-stats span.val {
    color: rgba(220,200,160,0.8);
    margin-right: 8px;
  }

  /* ── Conditions ── */
  .sb-conditions {
    margin-top: 5px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  .sb-condition-pill {
    font-family: 'Cinzel', serif;
    font-size: 7px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    border: 1px solid;
  }
  .sb-condition-pill.danger {
    color: rgba(220,80,80,0.9);
    border-color: rgba(220,80,80,0.35);
    background: rgba(220,80,80,0.08);
  }
  .sb-condition-pill.warn {
    color: rgba(220,150,50,0.9);
    border-color: rgba(220,150,50,0.35);
    background: rgba(220,150,50,0.08);
  }
  .sb-condition-pill.info {
    color: rgba(100,160,220,0.9);
    border-color: rgba(100,160,220,0.35);
    background: rgba(100,160,220,0.08);
  }
  .sb-condition-pill.buff {
    color: rgba(80,200,130,0.9);
    border-color: rgba(80,200,130,0.35);
    background: rgba(80,200,130,0.08);
  }
  /* Concentration tag */
  .sb-concentrate {
    margin-top: 4px;
    font-size: 8px;
    color: rgba(160,120,220,0.75);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Timed effects ── */
  .sb-effects {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 4px;
  }
  .sb-effect-pill {
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 3px;
    background: rgba(60,110,60,0.2);
    color: rgba(130,190,130,0.7);
    border: 1px solid rgba(70,130,70,0.3);
    white-space: nowrap;
    cursor: default;
  }
  .sb-effect-pill.conc {
    background: rgba(90,60,140,0.2);
    color: rgba(170,140,220,0.75);
    border-color: rgba(130,90,190,0.35);
  }
  .sb-effect-pill.warning {
    background: rgba(150,90,20,0.3);
    color: rgba(220,155,55,0.9);
    border-color: rgba(180,120,30,0.4);
    animation: effect-warn 1.4s ease-in-out infinite;
  }
  @keyframes effect-warn {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.45; }
  }

  /* ── Effect expiry block in feed ── */
  .effect-expired-block {
    margin: 0.4em 0 1.6em;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards;
    text-align: center;
  }
  .effect-expired-result {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: rgba(190,120,50,0.85);
    padding: 0.25em 1.2em;
    border: 1px solid rgba(190,120,50,0.25);
    border-radius: 1px;
    text-shadow: 0 0 8px rgba(190,120,50,0.25);
  }

  /* ── Features (Second Wind etc) ── */
  .sb-features {
    margin-top: 4px;
    font-size: 9px;
    color: rgba(200,185,150,0.4);
    line-height: 1.6;
  }

  /* ── Player card — clickable ── */
  .sb-player {
    cursor: pointer;
    pointer-events: auto;
    transition: background 0.18s ease;
    border-radius: 3px;
    margin-left: -4px;
    padding-left: 4px;
  }
  .sb-player:hover { background: rgba(180,140,60,0.06); }

  /* ── Character sheet modal ── */
  #sheet-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.78);
    align-items: center;
    justify-content: center;
  }
  #sheet-modal.open { display: flex; }
  #sheet-panel {
    background: rgba(8,6,4,0.97);
    border: 1px solid rgba(180,140,60,0.3);
    border-radius: 3px;
    box-shadow: 0 0 80px rgba(0,0,0,0.85), inset 0 0 40px rgba(0,0,0,0.5);
    width: min(680px, 90vw);
    max-height: 84vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(180,140,60,0.2) transparent;
    padding: 30px 34px 38px;
    position: relative;
    animation: sheetIn 0.18s ease;
  }
  @keyframes sheetIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #sheet-close {
    position: absolute; top: 14px; right: 18px;
    background: none; border: none;
    color: rgba(180,140,60,0.45); font-size: 18px;
    cursor: pointer; padding: 4px; line-height: 1;
    transition: color 0.15s;
  }
  #sheet-close:hover { color: rgba(180,140,60,0.9); }
  .sm-name {
    font-family: 'Cinzel', serif; font-size: 19px;
    letter-spacing: 4px; text-transform: uppercase;
    color: rgba(200,165,80,0.95); margin-bottom: 3px;
  }
  .sm-identity {
    font-size: 12px; color: rgba(200,185,150,0.45);
    margin-bottom: 16px; letter-spacing: 1px;
  }
  .sm-divider {
    height: 1px; background: rgba(180,140,60,0.12); margin: 15px 0;
  }
  .sm-section-title {
    font-family: 'Cinzel', serif; font-size: 11px;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(180,140,60,0.65); margin-bottom: 10px;
  }
  .sm-combat-strip {
    display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 2px;
  }
  .sm-stat-cell { text-align: center; }
  .sm-stat-label {
    font-family: 'Cinzel', serif; font-size: 7.5px;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(180,140,60,0.4); display: block;
  }
  .sm-stat-val {
    font-family: 'Cinzel', serif; font-size: 14px;
    color: rgba(220,200,160,0.88);
  }
  .sm-xp {
    font-size: 10px; color: rgba(180,140,60,0.45);
    font-family: 'Cinzel', serif; letter-spacing: 1px;
    margin-top: 4px;
  }
  .sm-ab-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
  }
  .sm-ab-cell { text-align: center; }
  .sm-ab-name {
    font-family: 'Cinzel', serif; font-size: 7.5px;
    letter-spacing: 1px; color: rgba(180,140,60,0.4);
    text-transform: uppercase;
  }
  .sm-ab-score {
    font-family: 'Cinzel', serif; font-size: 15px;
    color: rgba(220,200,160,0.85); line-height: 1.1;
  }
  .sm-ab-mod { font-size: 11px; color: rgba(180,140,60,0.65); }
  .sm-attacks-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  .sm-attacks-table th {
    font-family: 'Cinzel', serif; font-size: 7.5px; letter-spacing: 1px;
    text-transform: uppercase; color: rgba(180,140,60,0.45);
    text-align: left; padding: 0 10px 6px 0;
    border-bottom: 1px solid rgba(180,140,60,0.1);
  }
  .sm-attacks-table td {
    padding: 5px 10px 5px 0; color: rgba(210,195,160,0.75);
    border-bottom: 1px solid rgba(180,140,60,0.05); vertical-align: top;
  }
  .sm-attacks-table td.atk-name { color: rgba(220,200,160,0.95); }
  .sm-attacks-table td.atk-notes {
    color: rgba(200,185,150,0.45); font-style: italic; font-size: 11px;
  }
  .sm-spell-meta {
    font-size: 11px; color: rgba(200,185,150,0.45);
    margin-bottom: 10px; font-style: italic;
  }
  .sm-sub-label {
    font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px;
    text-transform: uppercase; margin: 8px 0 5px;
  }
  .sm-sub-label.cantrip-label { color: rgba(160,120,220,0.4); }
  .sm-sub-label.prepared-label { color: rgba(180,140,60,0.4); }
  .sm-spell-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .sm-spell-tag {
    font-size: 11px; color: rgba(200,185,150,0.8);
    background: rgba(180,140,60,0.06);
    border: 1px solid rgba(180,140,60,0.15);
    border-radius: 2px; padding: 3px 8px;
    cursor: pointer; transition: background 0.12s, border-color 0.12s;
  }
  .sm-spell-tag:hover {
    background: rgba(180,140,60,0.14);
    border-color: rgba(180,140,60,0.35);
  }
  .sm-spell-tag.cantrip {
    color: rgba(160,120,220,0.8);
    border-color: rgba(160,120,220,0.2);
    background: rgba(160,120,220,0.05);
  }
  .sm-spell-tag.cantrip:hover {
    background: rgba(160,120,220,0.12);
    border-color: rgba(160,120,220,0.4);
  }
  .sm-feature-name[data-srd-name] {
    cursor: pointer; transition: color 0.12s;
  }
  .sm-feature-name[data-srd-name]:hover { color: rgba(200,165,80,1); }
  .atk-name[data-srd-name] {
    cursor: pointer; transition: color 0.12s;
  }
  .atk-name[data-srd-name]:hover { color: rgba(220,200,160,1); text-decoration: underline dotted rgba(180,140,60,0.4); }
  .sm-inventory-list li[data-srd-name] {
    cursor: pointer; transition: color 0.12s;
  }
  .sm-inventory-list li[data-srd-name]:hover { color: rgba(220,200,160,0.9); }

  /* ── SRD lookup modal ─────────────────────────── */
  #srd-modal {
    display: none; position: fixed; inset: 0;
    z-index: 10500;
    background: rgba(0,0,0,0.72);
    align-items: center; justify-content: center;
  }
  #srd-modal.open { display: flex; }
  #srd-panel {
    background: rgba(6,4,3,0.98);
    border: 1px solid rgba(180,140,60,0.25);
    border-radius: 3px;
    box-shadow: 0 0 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.4);
    width: min(560px, 88vw);
    max-height: 78vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(180,140,60,0.15) transparent;
    padding: 26px 30px 32px;
    position: relative;
    animation: sheetIn 0.15s ease;
  }
  #srd-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none;
    color: rgba(180,140,60,0.4); font-size: 16px;
    cursor: pointer; padding: 4px; line-height: 1;
    transition: color 0.15s;
  }
  #srd-close:hover { color: rgba(180,140,60,0.85); }
  #srd-category-badge {
    font-family: 'Cinzel', serif; font-size: 7px;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(180,140,60,0.38); margin-bottom: 4px;
  }
  #srd-body {
    font-size: 12px; line-height: 1.7;
    color: rgba(200,185,150,0.82);
    white-space: pre-wrap; word-break: break-word;
  }
  #srd-body .srd-title {
    font-family: 'Cinzel', serif; font-size: 15px;
    color: rgba(210,180,90,0.92); letter-spacing: 1.5px;
    margin-bottom: 10px; line-height: 1.3;
  }
  #srd-body .srd-meta {
    font-size: 11px; color: rgba(180,140,60,0.55);
    margin-bottom: 12px; font-style: italic;
  }
  #srd-body .srd-desc { white-space: pre-wrap; }
  #srd-loading {
    font-size: 11px; font-family: 'Cinzel', serif;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(180,140,60,0.35); padding: 20px 0;
    text-align: center;
  }
  #srd-not-found {
    font-size: 11px; color: rgba(200,185,150,0.3);
    font-style: italic; padding: 16px 0;
  }
  .sm-feature { margin-bottom: 10px; }
  .sm-feature-name {
    font-family: 'Cinzel', serif; font-size: 11px;
    color: rgba(200,165,80,0.75); margin-bottom: 2px;
  }
  .sm-feature-text {
    font-size: 12px; color: rgba(200,185,150,0.6); line-height: 1.55;
  }
  .sm-inventory-list {
    list-style: none; column-count: 2; column-gap: 24px;
  }
  .sm-inventory-list li {
    font-size: 12px; color: rgba(200,185,150,0.7);
    padding: 2px 0; break-inside: avoid;
  }
  .sm-inventory-list li::before {
    content: '·  '; color: rgba(180,140,60,0.35);
  }
  .sm-no-data {
    font-size: 12px; color: rgba(200,185,150,0.25);
    font-style: italic; text-align: center; padding: 22px 0;
  }

  /* ── Inspiration badge (sidebar) ── */
  .sb-inspiration {
    display: block; margin-top: 5px;
    font-family: 'Cinzel', serif; font-size: 7.5px; letter-spacing: 1.5px;
    text-transform: uppercase; color: rgba(220,190,60,0.85);
    animation: inspBadgePulse 2.5s ease infinite;
  }
  @keyframes inspBadgePulse {
    0%, 100% { opacity: 0.65; } 50% { opacity: 1; }
  }

  /* ── Inspiration feed block ── */
  .inspiration-block {
    margin-bottom: 1.6em; padding: 14px 20px;
    border: 1px solid rgba(220,190,60,0.45);
    border-radius: 2px; background: rgba(180,140,40,0.05);
    text-align: center;
    opacity: 0;
    animation: inspirationGlow 0.9s ease forwards;
  }
  @keyframes inspirationGlow {
    0%   { opacity: 0; box-shadow: 0 0 0   rgba(220,190,60,0); }
    35%  { opacity: 1; box-shadow: 0 0 22px rgba(220,190,60,0.45); }
    100% { opacity: 1; box-shadow: 0 0 8px  rgba(220,190,60,0.12); }
  }
  .inspiration-title {
    font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 4px;
    text-transform: uppercase; color: rgba(220,190,60,0.92);
  }
  .inspiration-sub {
    font-size: 12px; font-style: italic;
    color: rgba(220,190,60,0.55); margin-top: 3px;
  }
  .inspiration-detail {
    font-size: 11px; font-style: italic;
    color: rgba(220,190,60,0.42); margin-top: 6px;
    line-height: 1.4;
  }

  /* ── XP award feed block ── */
  .xp-block {
    margin-bottom: 1.4em; padding: 10px 16px;
    border-left: 2px solid rgba(140,200,120,0.35);
    background: rgba(80,160,80,0.04);
    opacity: 0;
    animation: fadeIn 0.5s ease 0.1s forwards;
  }
  .xp-line {
    font-size: 12px; font-family: 'Cinzel', serif;
    letter-spacing: 1px; color: rgba(140,200,120,0.7);
  }
  .xp-detail {
    font-size: 11px; color: rgba(140,200,120,0.4);
    font-style: italic; margin-top: 2px;
  }

  /* ── Milestones (sidebar — Bardic Inspiration / Hero Coin / Fate Token / etc.) ── */
  .sb-milestones { margin-top: 6px; }
  .sb-milestone-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2px; gap: 6px;
  }
  .sb-milestone-label {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: rgba(220, 180, 90, 0.75);
  }
  .sb-milestone-count {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: #e0bf6e;
    background: rgba(220, 180, 90, 0.18);
    border: 1px solid rgba(220, 180, 90, 0.35);
    padding: 0 5px;
    border-radius: 7px;
    min-width: 14px;
    text-align: center;
    box-shadow: 0 0 6px rgba(220, 180, 90, 0.18) inset;
  }

  /* ── Milestone award block (feed; stack-based reward, distinct from binary Inspiration) ── */
  .milestone-block {
    margin: 0.6em 0 1.6em;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
    text-align: center;
    padding: 0.65em 1.1em 0.7em;
    border-top: 1px solid rgba(220, 180, 90, 0.35);
    border-bottom: 1px solid rgba(220, 180, 90, 0.35);
    background: linear-gradient(180deg, rgba(60, 40, 10, 0.18), rgba(40, 30, 10, 0.1));
    box-shadow: 0 0 22px rgba(220, 180, 90, 0.18);
  }
  .milestone-header {
    font-family: 'Cinzel', serif;
    color: #e0bf6e;
    text-shadow: 0 0 12px rgba(220, 180, 90, 0.45);
    letter-spacing: 1.5px;
  }
  .milestone-icon { margin-right: 0.4em; opacity: 0.85; }
  .milestone-name { font-size: 13px; }
  .milestone-label {
    font-size: 11px; opacity: 0.75; margin-left: 0.6em;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .milestone-detail {
    margin-top: 0.45em;
    font-style: italic;
    font-size: 12px;
    color: #d2b76a;
    opacity: 0.85;
  }

  /* ── Spell slots (sidebar) ── */
  .sb-slots { margin-top: 5px; }
  .sb-slot-row { display: flex; align-items: center; gap: 3px; margin-bottom: 2px; }
  .sb-slot-level {
    font-family: 'Cinzel', serif; font-size: 7px;
    color: rgba(160,120,220,0.5); width: 14px; text-align: right; flex-shrink: 0;
  }
  .sb-slot-pip {
    width: 6px; height: 6px; border-radius: 50%; border: 1px solid;
    flex-shrink: 0;
  }
  .sb-slot-pip.avail { background: rgba(160,120,220,0.6); border-color: rgba(160,120,220,0.6); }
  .sb-slot-pip.spent { background: transparent; border-color: rgba(160,120,220,0.18); }

  /* ── Faction panel (sidebar) ── */
  #sb-factions {
    margin-top: 12px; padding-top: 10px;
    border-top: 1px solid rgba(180,140,60,0.08);
  }
  .sb-factions-header {
    font-family: 'Cinzel', serif; font-size: 7.5px; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(180,140,60,0.35); margin-bottom: 6px;
  }
  .sb-faction-item {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 6px; padding: 2px 0;
  }
  .sb-faction-name {
    font-size: 9px; color: rgba(200,185,150,0.6);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .sb-faction-standing {
    font-family: 'Cinzel', serif; font-size: 7.5px;
    letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap;
  }
  .sb-faction-standing.allied    { color: rgba(80,200,130,0.80); }
  .sb-faction-standing.friendly  { color: rgba(80,200,130,0.60); }
  .sb-faction-standing.neutral   { color: rgba(180,140,60,0.60); }
  .sb-faction-standing.unfriendly,
  .sb-faction-standing.suspicious{ color: rgba(220,120,50,0.70); }
  .sb-faction-standing.hostile   { color: rgba(220,60,60,0.80); }
  .sb-faction-standing.unknown   { color: rgba(200,185,150,0.25); }

  /* ── Quest tracker ── */
  #sb-quests {
    margin-top: 12px; padding-top: 10px;
    border-top: 1px solid rgba(180,140,60,0.08);
  }
  .sb-quests-header {
    font-family: 'Cinzel', serif; font-size: 7.5px; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(180,140,60,0.35); margin-bottom: 6px;
  }
  .sb-quest-item {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 6px; padding: 2px 0;
  }
  .sb-quest-name {
    font-size: 9px; color: rgba(200,185,150,0.6);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .sb-quest-status {
    font-family: 'Cinzel', serif; font-size: 7.5px;
    letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap;
  }
  .sb-quest-status.active   { color: rgba(180,140,60,0.85); }
  .sb-quest-status.threat   { color: rgba(220,60,60,0.80); }
  .sb-quest-status.resolved { color: rgba(80,200,130,0.70); }
  .sb-quest-status.failed   { color: rgba(200,100,80,0.50); }
  .sb-quest-status.unknown  { color: rgba(200,185,150,0.25); }

  /* ── Relationships (sheet modal) ── */
  .sm-relationship { display: flex; gap: 10px; align-items: baseline; margin-bottom: 8px; }
  .sm-rel-name {
    font-family: 'Cinzel', serif; font-size: 11px;
    color: rgba(200,165,80,0.75); min-width: 90px; flex-shrink: 0;
  }
  .sm-rel-role {
    font-size: 10px; font-style: italic;
    color: rgba(160,120,220,0.6); min-width: 60px; flex-shrink: 0;
  }
  .sm-rel-note { font-size: 11px; color: rgba(200,185,150,0.5); line-height: 1.45; }

  /* ── Clickable sheet items ── */
  .sm-clickable { cursor: default; }

  /* ── Turn order section ── */
  #sb-turn-section {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid rgba(180,140,60,0.12);
  }
  .sb-turn-header {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(180,140,60,0.55);
    margin-bottom: 6px;
  }
  .sb-turn-item {
    font-size: 10px;
    color: rgba(200,185,150,0.4);
    padding: 2px 0 2px 14px;
    line-height: 1.5;
    position: relative;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sb-turn-item.sb-turn-current {
    color: rgba(220,200,160,0.95);
    font-family: 'Cinzel', serif;
    font-size: 10px;
  }
  .sb-turn-item.sb-turn-current::before {
    content: '▶';
    position: absolute;
    left: 0;
    font-size: 7px;
    color: rgba(180,140,60,0.8);
    top: 4px;
  }

  /* ── CRIT / FUMBLE flash overlay ── */
  #flash-overlay {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9;
    opacity: 0;
  }
  @keyframes flashCrit {
    0%   { opacity: 0; background: radial-gradient(ellipse at 50% 50%, rgba(210,170,40,0.55) 0%, transparent 65%); }
    12%  { opacity: 1; }
    100% { opacity: 0; background: radial-gradient(ellipse at 50% 50%, rgba(210,170,40,0) 0%, transparent 65%); }
  }
  @keyframes flashFumble {
    0%   { opacity: 0; background: radial-gradient(ellipse at 50% 50%, rgba(180,30,30,0.65) 0%, transparent 65%); }
    8%   { opacity: 1; }
    100% { opacity: 0; background: radial-gradient(ellipse at 50% 50%, rgba(180,30,30,0) 0%, transparent 65%); }
  }
  .flash-crit   { animation: flashCrit   2.0s ease-out forwards; }
  .flash-fumble { animation: flashFumble 1.6s ease-out forwards; }

  /* ── HP number flash ── */
  @keyframes hpDmg  { 0% { color:#d05050; } 100% { color:rgba(220,200,160,0.75); } }
  @keyframes hpHeal { 0% { color:#55cc70; } 100% { color:rgba(220,200,160,0.75); } }
  .hp-flash-dmg  { animation: hpDmg  1.4s ease-out forwards; }
  .hp-flash-heal { animation: hpHeal 1.0s ease-out forwards; }

  /* ── World clock ── */
  #world-clock {
    position: fixed;
    top: 28px; right: 32px;
    z-index: 5;
    text-align: right;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s ease;
    user-select: none;
  }
  #world-clock.has-data { opacity: 1; }
  #wc-icon {
    font-family: system-ui, sans-serif;
    font-size: 16px;
    line-height: 1;
    margin-bottom: 5px;
    opacity: 0.6;
  }
  #wc-date {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(180,140,60,0.65);
    line-height: 1.5;
  }
  #wc-sub {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(180,140,60,0.38);
    line-height: 1.5;
    margin-top: 1px;
  }

  /* ── Audio toggle controls ── */
  #audio-controls {
    position: fixed;
    top: 96px; right: 28px;
    z-index: 6;
    display: flex;
    flex-direction: column;
    gap: 7px;
    opacity: 0.38;
    transition: opacity 0.3s ease;
    pointer-events: auto;
  }
  #audio-controls:hover { opacity: 0.85; }
  .speed-label {
    font-family: 'Cinzel', serif;
    font-size: 7.5px;
    letter-spacing: 1.5px;
    color: rgba(180,140,60,0.75);
    text-transform: uppercase;
    min-width: 42px;
    text-align: right;
    cursor: pointer;
    user-select: none;
  }
  .speed-label:hover { color: rgba(220,185,100,1); }

  /* ── Player input panel ── */
  #input-panel {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    width: min(540px, 80vw);
    background: rgba(10, 7, 3, 0.92);
    border: 1px solid rgba(180,140,60,0.28);
    border-radius: 6px;
    backdrop-filter: blur(10px);
    transition: border-color 0.2s ease;
  }
  #input-panel:focus-within { border-color: rgba(180,140,60,0.55); }
  #input-panel-header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; cursor: pointer; user-select: none;
  }
  #input-panel-label {
    font-family: 'Cinzel', serif; font-size: 8px;
    letter-spacing: 2px; color: rgba(180,140,60,0.65);
    text-transform: uppercase; flex: 1;
  }
  #input-badge {
    display: none; font-family: 'Cinzel', serif; font-size: 7px;
    letter-spacing: 1px; color: rgba(220,185,100,1);
    background: rgba(40,25,5,0.9); border: 1px solid rgba(180,140,60,0.55);
    border-radius: 10px; padding: 1px 8px;
  }
  #input-toggle-arrow {
    font-size: 9px; color: rgba(180,140,60,0.45);
  }
  #input-body {
    padding: 0 14px 14px;
    display: flex; flex-direction: column; gap: 9px;
  }
  #input-panel.collapsed #input-body { display: none; }
  #char-tabs { display: flex; gap: 5px; flex-wrap: wrap; }
  .char-tab {
    font-family: 'Cinzel', serif; font-size: 7.5px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(180,140,60,0.5);
    border: 1px solid rgba(180,140,60,0.22);
    border-radius: 3px; padding: 4px 10px;
    cursor: pointer; background: transparent;
    transition: all 0.15s ease; user-select: none;
  }
  .char-tab:hover { color: rgba(220,185,100,0.85); border-color: rgba(180,140,60,0.5); }
  .char-tab.active {
    color: rgba(220,185,100,1); border-color: rgba(180,140,60,0.75);
    background: rgba(30,20,5,0.55);
  }
  #player-input-text {
    width: 100%; box-sizing: border-box;
    background: rgba(8,5,2,0.85); border: 1px solid rgba(180,140,60,0.18);
    border-radius: 3px; color: rgba(220,200,160,0.9);
    font-family: 'IM Fell English', serif; font-size: 13px;
    padding: 8px 10px; resize: none; outline: none;
    transition: border-color 0.15s ease;
  }

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// SCENE MANAGEMENT
// ═══════════════════════════════════════════════════════════════════

const SCENE_DEFAULTS = {
  colors: ['#1a0800', '#2e1400'],
  accent: '#c8601a',
  particles: 'embers',
  label: 'The Inn',
  name: 'tavern',
};

let activeScene = { ...SCENE_DEFAULTS };
let bgActive = 'a'; // which bg layer is currently showing

function applyScene(scene) {
  if (!scene || scene.name === activeScene.name) return;
  activeScene = { ...SCENE_DEFAULTS, ...scene };

  // Update scene indicator with a fade
  const indicator = document.getElementById('scene-indicator');
  indicator.classList.add('changing');
  setTimeout(() => {
    indicator.textContent = '— ' + (activeScene.label || activeScene.name) + ' —';
    indicator.classList.remove('changing');
  }, 400);

  // Crossfade background layers
  const incoming = bgActive === 'a' ? 'b' : 'a';
  const inEl  = document.getElementById('bg-' + incoming);
  const outEl = document.getElementById('bg-' + bgActive);

  const [top, bot] = activeScene.colors;
  inEl.style.background =
    `radial-gradient(ellipse at 50% 30%, ${top} 0%, ${bot} 100%)`;
  inEl.style.opacity = '1';
  outEl.style.opacity = '0';
  bgActive = incoming;

  // Switch particle type
  particleSystem.switchType(activeScene.particles, activeScene.accent);
  // no audio hook on scene change — ambient removed
}

// Initialise background to default scene
;(function initBg() {
  const el = document.getElementById('bg-' + bgActive);
  const [top, bot] = SCENE_DEFAULTS.colors;
  el.style.background =
    `radial-gradient(ellipse at 50% 30%, ${top} 0%, ${bot} 100%)`;
})();


// ═══════════════════════════════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════════

const canvas  = document.getElementById('particles');
const ctx     = canvas.getContext('2d');
let W = 0, H = 0;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── Particle classes ──────────────────────────────────────────────

function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

class Particle {
  constructor(type, accent) {
    this.type   = type;
    this.accent = accent;
    this.reset();
  }
  reset() {
    const T = this.type;
    this.x    = rand(0, W);
    this.y    = rand(0, H);
    this.life = 0;
    this.maxLife = 1;
    this.size = 2;
    this.alpha = 0;
    this.vx = 0; this.vy = 0;
    this._phase = rand(0, Math.PI * 2);

    if (T === 'embers') {
      this.x = rand(0, W);
      this.y = rand(H * 0.6, H);
      this.vx = rand(-0.4, 0.4);
      this.vy = rand(-0.8, -0.3);
      this.size = rand(1, 3);
      this.maxLife = rand(120, 300);
      this._color = this.accent;
    } else if (T === 'fireflies') {
      this.x = rand(0, W);
      this.y = rand(H * 0.2, H * 0.9);
      this.vx = rand(-0.3, 0.3);
      this.vy = rand(-0.2, 0.2);
      this.size = rand(1.5, 3.5);
      this.maxLife = rand(200, 500);
      this._color = '#a0ff60';
    } else if (T === 'smoke') {
      this.x = rand(0, W);
      this.y = H + 10;
      this.vx = rand(-0.2, 0.2);
      this.vy = rand(-0.4, -0.15);
      this.size = rand(6, 18);
      this.maxLife = rand(180, 350);
      this._color = '#404040';
    } else if (T === 'dust') {
      this.x = rand(0, W);
      this.y = rand(0, H);
      this.vx = rand(-0.1, 0.1);
      this.vy = rand(-0.05, 0.08);
      this.size = rand(0.5, 1.8);
      this.maxLife = rand(300, 600);
      this._color = '#a09060';
    } else if (T === 'snow') {
      this.x = rand(-10, W + 10);
      this.y = rand(-10, 0);
      this.vx = rand(-0.3, 0.3);
      this.vy = rand(0.4, 1.2);
      this.size = rand(1, 3.5);
      this.maxLife = rand(200, 450);
      this._color = '#d8e8ff';
    } else if (T === 'stars') {
      this.x = rand(0, W);
      this.y = rand(0, H * 0.8);
      this.vx = 0; this.vy = 0;
      this.size = rand(0.5, 2);
      this.maxLife = rand(400, 900);
      this._color = '#c0d0ff';
    } else if (T === 'bubbles') {
      this.x = rand(0, W);
      this.y = H + 10;
      this.vx = rand(-0.2, 0.2);
      this.vy = rand(-0.5, -0.2);
      this.size = rand(2, 8);
      this.maxLife = rand(200, 400);
      this._color = '#60a0d0';
    } else if (T === 'sparks') {
      this.x = rand(0, W);
      this.y = rand(H * 0.4, H);
      this.vx = rand(-1.5, 1.5);
      this.vy = rand(-2, -0.5);
      this.size = rand(0.8, 2.5);
      this.maxLife = rand(40, 100);
      this._color = '#ffe060';
    } else if (T === 'sand') {
      this.x = rand(-20, 0);
      this.y = rand(0, H);
      this.vx = rand(1.2, 2.8);
      this.vy = rand(-0.2, 0.4);
      this.size = rand(0.8, 2.2);
      this.maxLife = rand(150, 350);
      this._color = '#c0a060';
    } else if (T === 'rain') {
      this.x = rand(-20, W);
      this.y = rand(-20, 0);
      this.vx = rand(0.5, 1.2);
      this.vy = rand(6, 14);
      this.size = rand(1, 2);
      this.maxLife = rand(60, 120);
      this._color = '#8090b0';
    } else if (T === 'drips') {
      this.x = rand(0, W);
      this.y = rand(-20, 0);
      this.vx = 0;
      this.vy = rand(1.5, 4);
      this.size = rand(1.5, 3.5);
      this.maxLife = rand(80, 180);
      this._color = '#6090b0';
    } else if (T === 'mist') {
      this.x = rand(-120, W + 120);
      this.y = rand(H * 0.05, H * 0.85);
      this.vx = rand(0.04, 0.18);
      this.vy = rand(-0.015, 0.015);
      this.size = rand(70, 180);
      this.maxLife = rand(700, 1400);
      this._color = '#7888a0';
    } else if (T === 'leaves') {
      this.x = rand(0, W);
      this.y = rand(-20, 0);
      this.vx = rand(-0.7, 0.7);
      this.vy = rand(0.5, 1.6);
      this.size = rand(4, 9);
      this.maxLife = rand(220, 520);
      this._rot = rand(0, Math.PI * 2);
      this._rotSpeed = rand(-0.045, 0.045);
      const lc = ['#8B4513','#D2691E','#c8a020','#CD853F','#a06828'];
      this._color = lc[randInt(0, lc.length - 1)];
    } else if (T === 'ripples') {
      this.x = rand(0, W);
      this.y = rand(H * 0.55, H);
      this.vx = 0; this.vy = 0;
      this.size = rand(6, 22);
      this.maxLife = rand(100, 220);
      this._color = '#4888c0';
    } else {
      // fallback = dust
      this.vx = 0; this.vy = 0;
      this.size = 1;
      this.maxLife = 300;
      this._color = '#808080';
    }
  }

  update() {
    this.life++;
    const T = this.type;
    const progress = this.life / this.maxLife;

    // Alpha envelope: fade in first 10%, full mid, fade out last 20%
    if (progress < 0.1)       this.alpha = progress / 0.1;
    else if (progress > 0.8)  this.alpha = (1 - progress) / 0.2;
    else                      this.alpha = 1;

    this.x += this.vx;
    this.y += this.vy;

    if (T === 'embers') {
      this.vx += rand(-0.05, 0.05);
      this.vx  = Math.max(-0.6, Math.min(0.6, this.vx));
      if (this.life % 20 === 0) this.alpha *= rand(0.5, 1.0);
    } else if (T === 'fireflies') {
      this._phase += 0.03;
      this.x += Math.sin(this._phase) * 0.5;
      this.y += Math.cos(this._phase * 0.7) * 0.3;
      this.alpha *= (0.85 + 0.15 * Math.sin(this._phase * 2));
    } else if (T === 'smoke') {
      this.size += 0.04;
      this.vx  += rand(-0.01, 0.01);
    } else if (T === 'stars') {
      this._phase += 0.02;
      this.alpha *= (0.85 + 0.15 * Math.sin(this._phase));
    } else if (T === 'sparks') {
      this.vy += 0.08; // gravity
    } else if (T === 'leaves') {
      this._rot += this._rotSpeed;
      this.vx += rand(-0.025, 0.025);
      this.vx = Math.max(-1.2, Math.min(1.2, this.vx));
    } else if (T === 'ripples') {
      this.size += 0.55;
    }

    return this.life < this.maxLife;
  }

  draw(ctx) {
    const T = this.type;
    const [r,g,b] = hexToRgb(this._color);
    ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));

    if (T === 'smoke') {
      const grad = ctx.createRadialGradient(
        this.x, this.y, 0, this.x, this.y, this.size);
      grad.addColorStop(0, `rgba(${r},${g},${b},0.3)`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (T === 'embers' || T === 'fireflies' || T === 'sparks') {
      // Glow effect
      const glow = ctx.createRadialGradient(
        this.x, this.y, 0, this.x, this.y, this.size * 3);
      glow.addColorStop(0, `rgba(${r},${g},${b},0.6)`);
      glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fill();
      // Core dot
      ctx.fillStyle = `rgb(${Math.min(255,r+60)},${Math.min(255,g+40)},${Math.min(255,b+20)})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    } else if (T === 'bubbles') {
      ctx.strokeStyle = `rgba(${r},${g},${b},0.6)`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.stroke();
    } else if (T === 'rain') {
      ctx.strokeStyle = `rgba(${r},${g},${b},0.5)`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + this.vx * 3, this.y + this.vy * 3);
      ctx.stroke();
    } else if (T === 'drips') {
      ctx.fillStyle = `rgba(${r},${g},${b},0.7)`;
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, this.size * 0.4, this.size, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (T === 'mist') {
      const mg = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
      mg.addColorStop(0, `rgba(${r},${g},${b},0.055)`);
      mg.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = mg;
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, this.size, this.size * 0.38, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (T === 'leaves') {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this._rot);
      ctx.fillStyle = `rgba(${r},${g},${b},0.88)`;
      ctx.beginPath();
      ctx.ellipse(0, 0, this.size * 0.42, this.size, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else if (T === 'ripples') {
      ctx.strokeStyle = `rgba(${r},${g},${b},0.28)`;
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, this.size, this.size * 0.28, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = `rgba(${r},${g},${b},1)`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = 1;
  }
}

// ── Particle system controller ────────────────────────────────────

const PARTICLE_COUNT = {
  embers: 80, fireflies: 45, smoke: 20, dust: 90,
  snow: 110, stars: 160, bubbles: 45, sparks: 50,
  sand: 80, rain: 130, drips: 35,
  mist: 12, leaves: 55, ripples: 18,
};

const particleSystem = {
  particles: [],
  type: 'embers',
  accent: SCENE_DEFAULTS.accent,
  transitioning: false,

  init() {
    this.populate(this.type, this.accent);
  },

  populate(type, accent) {
    const count = PARTICLE_COUNT[type] || 60;
    this.particles = [];
    for (let i = 0; i < count; i++) {
      const p = new Particle(type, accent);
      p.life = randInt(0, p.maxLife);  // stagger so they don't all start together
      this.particles.push(p);
    }
  },

  switchType(newType, accent) {
    if (newType === this.type) return;
    this.type   = newType;
    this.accent = accent || '#ffffff';
    // Fade out current by letting them die, then repopulate
    // Mark old particles so they run out fast
    this.particles.forEach(p => { p.life = Math.max(p.life, p.maxLife - 30); });
    // Add new particles over ~2s
    let added = 0;
    const target = PARTICLE_COUNT[newType] || 60;
    const interval = setInterval(() => {
      if (added >= target) { clearInterval(interval); return; }
      const p = new Particle(newType, this.accent);
      this.particles.push(p);
      added++;
    }, 2000 / target);
  },

  update() {
    this.particles = this.particles.filter(p => p.update());
    // Replenish
    const target = PARTICLE_COUNT[this.type] || 60;
    while (this.particles.length < target) {
      const p = new Particle(this.type, this.accent);
      this.particles.push(p);
    }
  },

  draw() {
    ctx.clearRect(0, 0, W, H);
    this.particles.forEach(p => p.draw(ctx));
  },
};

particleSystem.init();

// ── Sky Renderer ──────────────────────────────────────────────────

const skyCanvas = document.getElementById('sky');
const skyCtx    = skyCanvas.getContext('2d');
let SW = 0, SH = 0;

function resizeSky() {
  const dpr = window.devicePixelRatio || 1;
  SW = window.innerWidth;
  SH = Math.round(window.innerHeight * 0.42);
  skyCanvas.width  = SW * dpr;
  skyCanvas.height = SH * dpr;
  skyCanvas.style.width  = SW + 'px';
  skyCanvas.style.height = SH + 'px';
  skyCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeSky);
resizeSky();

const skyRenderer = (() => {
  let _time = 'morning', _weather = '';

  // Pre-computed star positions (twinkling dots, night only)
  const STARS = Array.from({length: 130}, () => ({
    x: Math.random(), y: Math.random(),
    r: 0.4 + Math.random() * 1.6,
    ph: Math.random() * Math.PI * 2,
    spd: 0.008 + Math.random() * 0.022,
  }));

  // Cloud objects — drift left, wrap to right
  const CLOUD_BLOBS = [[0,0,30],[-25,10,23],[23,8,25],[-9,-12,19],[13,-9,17],[36,14,17],[-36,14,15],[6,16,13]];
  const CLOUDS = Array.from({length: 5}, (_, i) => ({
    x: (i / 5) * (SW + 600) - 100,
    y: 0, sc: 1, spd: 0.1,
  }));
  function resetCloud(c, offscreen) {
    c.x   = offscreen ? SW + rand(100, 350) : rand(-200, SW + 200);
    c.y   = rand(SH * 0.06, SH * 0.68);
    c.sc  = rand(0.65, 1.75);
    c.spd = rand(0.07, 0.22);
  }
  CLOUDS.forEach(c => resetCloud(c, false));

  function drawCloud(c, opacity, color) {
    skyCtx.globalAlpha = opacity;
    skyCtx.fillStyle = color;
    CLOUD_BLOBS.forEach(([dx, dy, r]) => {
      skyCtx.beginPath();
      skyCtx.arc(c.x + dx * c.sc, c.y + dy * c.sc, r * c.sc, 0, Math.PI * 2);
      skyCtx.fill();
    });
    skyCtx.globalAlpha = 1;
  }

  function glow(x, y, r0, r1, c0, c1) {
    const g = skyCtx.createRadialGradient(x, y, r0, x, y, r1);
    g.addColorStop(0, c0); g.addColorStop(1, c1);
    skyCtx.fillStyle = g;
    skyCtx.beginPath();
    skyCtx.arc(x, y, r1, 0, Math.PI * 2);
    skyCtx.fill();
  }

  return {
    setState(wt) {
      if (!wt) return;
      _time    = (wt.time    || 'morning').toLowerCase();
      _weather = (wt.weather || '').toLowerCase();
    },

    draw() {
      skyCtx.clearRect(0, 0, SW, SH);

      const isNight  = /night|midnight|late/.test(_time);
      const isDusk   = /evening|dusk/.test(_time);
      const isDawn   = /dawn/.test(_time);
      const isRain   = /rain|storm/.test(_weather);
      const isCloudy = /cloud|overcast/.test(_weather) || isRain;
      const isFog    = /fog|mist/.test(_weather);

      // Stars (night / dusk)
      if (isNight || isDusk) {
        const mod = isNight ? 1 : 0.35;
        STARS.forEach(s => {
          s.ph += s.spd;
          const a = (0.25 + 0.55 * Math.sin(s.ph)) * mod * (isRain ? 0.15 : 1);
          if (a <= 0.01) return;
          skyCtx.globalAlpha = a;
          skyCtx.fillStyle = '#c8d4ff';
          skyCtx.beginPath();
          skyCtx.arc(s.x * SW, s.y * SH, s.r, 0, Math.PI * 2);
          skyCtx.fill();
        });
        skyCtx.globalAlpha = 1;
      }

      // Moon (night / dusk)
      if (isNight || isDusk) {
        const mx = SW * 0.76, my = SH * 0.24;
        const ma = isNight ? 0.82 : 0.32;
        glow(mx, my, 10, 72, `rgba(190,200,230,${(ma * 0.18).toFixed(2)})`, 'rgba(190,200,230,0)');
        skyCtx.globalAlpha = ma;
        skyCtx.fillStyle = '#d8e0f4';
        skyCtx.beginPath(); skyCtx.arc(mx, my, 15, 0, Math.PI * 2); skyCtx.fill();
        // Crescent: paint shadow circle using clip
        skyCtx.save();
        skyCtx.beginPath(); skyCtx.arc(mx, my, 15, 0, Math.PI * 2); skyCtx.clip();
        skyCtx.fillStyle = 'rgba(8,12,28,0.82)';
        skyCtx.beginPath(); skyCtx.arc(mx + 9, my - 4, 13, 0, Math.PI * 2); skyCtx.fill();
        skyCtx.restore();
        skyCtx.globalAlpha = 1;
      }

      // Sun (day / dusk / dawn)
      if (!isNight) {
        let sx, sy, inner, outer;
        if (isDawn) {
          [sx, sy] = [SW * 0.12, SH * 0.90];
          [inner, outer] = ['rgba(255,155,55,0.72)', 'rgba(255,100,20,0)'];
        } else if (/morning/.test(_time)) {
          [sx, sy] = [SW * 0.18, SH * 0.38];
          [inner, outer] = ['rgba(255,225,130,0.62)', 'rgba(255,200,80,0)'];
        } else if (/midday|noon/.test(_time)) {
          [sx, sy] = [SW * 0.50, SH * 0.06];
          [inner, outer] = ['rgba(255,248,190,0.44)', 'rgba(255,245,160,0)'];
        } else if (/afternoon/.test(_time)) {
          [sx, sy] = [SW * 0.80, SH * 0.32];
          [inner, outer] = ['rgba(255,215,100,0.55)', 'rgba(255,185,60,0)'];
        } else { // evening / dusk
          [sx, sy] = [SW * 0.88, SH * 0.84];
          [inner, outer] = ['rgba(245,110,28,0.75)', 'rgba(210,65,0,0)'];
        }
        glow(sx, sy, 4, 95, inner, outer);
        glow(sx, sy, 0, 26, inner.replace(/[\d.]+\)$/, '1)'), inner.replace(/[\d.]+\)$/, '0)'));
      }

      // Clouds
      const cloudAlpha = isRain ? 0.40 : isCloudy ? 0.22 : isFog ? 0.14 : 0.08;
      const cloudCount = isRain ? 5  : isCloudy ? 4 : 2;
      const cloudColor = isNight ? '#303248' : isDusk ? '#a05828' : isRain ? '#3a3c4c' : '#c4c8d8';
      const windMult   = isRain ? 2.2 : 1;

      CLOUDS.forEach((c, i) => {
        if (i >= cloudCount) return;
        c.x -= c.spd * windMult;
        if (c.x < -300 * c.sc) resetCloud(c, true);
        const ao = cloudAlpha * (0.7 + 0.06 * i);
        drawCloud(c, ao, cloudColor);
      });

      // Bottom gradient fade — sky dissolves into scene background
      skyCtx.globalCompositeOperation = 'destination-out';
      const fade = skyCtx.createLinearGradient(0, SH * 0.52, 0, SH);
      fade.addColorStop(0, 'rgba(0,0,0,0)');
      fade.addColorStop(1, 'rgba(0,0,0,1)');
      skyCtx.fillStyle = fade;
      skyCtx.fillRect(0, SH * 0.52, SW, SH * 0.48);
      skyCtx.globalCompositeOperation = 'source-over';
    },
  };
})();

// ── Animation loop ────────────────────────────────────────────────

function loop() {
  particleSystem.update();
  particleSystem.draw();
  skyRenderer.draw();
  requestAnimationFrame(loop);
}
loop();


// ═══════════════════════════════════════════════════════════════════
// TYPEWRITER / TEXT RENDERING
// ═══════════════════════════════════════════════════════════════════

const textScroll  = document.getElementById('text-scroll');
const textContent = document.getElementById('text-content');

let charQueue       = [];
let isTyping        = false;
let currentEl       = null;
let currentCursor   = null;
let _currentInlineEl = null;  // tracks open <em>/<strong> during typewriter
let lastChunkTime   = Date.now();
let idleTimer       = null;

// ── Markdown segment parser ───────────────────────────────────────────────────
// Converts a text string into typed queue items for the typewriter.
// Items are plain chars, '\n' strings, {open/close tag} objects, or {table} objects.

// Parse inline markdown (bold, italic) from a single line into items array.
function _mdParseInline(text, items) {
  let i = 0;
  while (i < text.length) {
    // Bold (**text**) — must check before single *
    if (text[i] === '*' && text[i + 1] === '*') {
      const end = text.indexOf('**', i + 2);
      if (end === -1) { items.push(text[i]); i++; continue; }
      items.push({open: 'strong'});
      for (let j = i + 2; j < end; j++) items.push(text[j]);
      items.push({close: 'strong'});
      i = end + 2; continue;
    }
    // Italic (*text*)
    if (text[i] === '*') {
      const end = text.indexOf('*', i + 1);
      if (end === -1) { items.push(text[i]); i++; continue; }
      items.push({open: 'em'});
      for (let j = i + 1; j < end; j++) items.push(text[j]);
      items.push({close: 'em'});
      i = end + 1; continue;
    }
    items.push(text[i]); i++;
  }
}

// Split a markdown table row "| a | b | c |" into ["a","b","c"].
function _splitTableRow(line) {
  let s = line.trim();
  if (s.startsWith('|')) s = s.slice(1);
  if (s.endsWith('|'))   s = s.slice(0, -1);
  return s.split('|').map(c => c.trim());
}

// Detect a markdown table block starting at lines[idx].
// Returns {headers, rows, end} or null.
function _detectTable(lines, idx) {
  const header = lines[idx];
  const sep    = lines[idx + 1];
  if (!header || !sep) return null;
  if (!/^\s*\|.*\|\s*$/.test(header)) return null;
  if (!/^\s*\|?\s*:?-{2,}:?(\s*\|\s*:?-{2,}:?)+\s*\|?\s*$/.test(sep)) return null;
  const headerCells = _splitTableRow(header);
  const rows = [];
  let j = idx + 2;
  while (j < lines.length && /^\s*\|.*\|\s*$/.test(lines[j])) {
    rows.push(_splitTableRow(lines[j]));
    j++;
  }
  return { headers: headerCells, rows, end: j };
}

// Build a <table> DOM node from a parsed table segment.
function _buildTableNode(tbl) {
  const t = document.createElement('table');
  t.className = 'dm-table';
  if (tbl.headers && tbl.headers.length) {
    const thead = document.createElement('thead');
    const tr = document.createElement('tr');
    tbl.headers.forEach(h => {
      const th = document.createElement('th');
      const inline = [];
      _mdParseInline(h, inline);
      _appendInlineSegments(th, inline);
      tr.appendChild(th);
    });
    thead.appendChild(tr);
    t.appendChild(thead);
  }
  const tbody = document.createElement('tbody');
  tbl.rows.forEach(row => {
    const tr = document.createElement('tr');
    row.forEach(cell => {
      const td = document.createElement('td');
      const inline = [];
      _mdParseInline(cell, inline);
      _appendInlineSegments(td, inline);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  t.appendChild(tbody);
  return t;
}

// Append a flat list of inline segments to a DOM node.
function _appendInlineSegments(parent, segments) {
  let inline = null;
  for (const s of segments) {
    if (s && typeof s === 'object' && s.open) {
      const el = document.createElement(s.open);
      parent.appendChild(el);
      inline = el;
    } else if (s && typeof s === 'object' && s.close) {
      inline = null;
    } else {
      (inline || parent).appendChild(document.createTextNode(s));
    }
  }
}

// Main parser: splits text into lines, detects table blocks, falls back to inline parsing.
function _mdParse(text) {
  const items = [];
  const lines = text.split('\n');
  for (let li = 0; li < lines.length; li++) {
    const tbl = _detectTable(lines, li);
    if (tbl) {
      items.push({ table: { headers: tbl.headers, rows: tbl.rows } });
      li = tbl.end - 1;
      if (li < lines.length - 1) items.push('\n');
      continue;
    }
    _mdParseInline(lines[li], items);
    if (li < lines.length - 1) items.push('\n');
  }
  return items;
}

// Auto-scroll: only follow if the user hasn't scrolled up
let userScrolledUp = false;
textScroll.addEventListener('scroll', () => {
  const distFromBottom = textScroll.scrollHeight - textScroll.scrollTop - textScroll.clientHeight;
  userScrolledUp = distFromBottom > 80;
});

let charDelay = 18;      // ms per character while typing (mutable — see speed toggle)
const IDLE_GAP   = 1800; // ms silence before starting a new block

function getOrCreateBlock() {
  if (!currentEl) {
    currentEl = document.createElement('div');
    currentEl.className = 'dm-block';
    const p = document.createElement('p');
    currentEl.appendChild(p);
    textContent.appendChild(currentEl);
    scrollToBottom();
  }
  return currentEl.querySelector('p:last-child');
}

function typeNextChar() {
  if (charQueue.length === 0) {
    isTyping = false;
    return;
  }

  const item = charQueue.shift();
  const p    = getOrCreateBlock();

  if (currentCursor) currentCursor.classList.remove('typing-cursor');

  if (item === '\n') {
    // New paragraph — reset inline state
    _currentInlineEl = null;
    const next = document.createElement('p');
    currentEl.appendChild(next);
  } else if (item && typeof item === 'object' && item.table) {
    _currentInlineEl = null;
    currentEl.appendChild(_buildTableNode(item.table));
  } else if (item && typeof item === 'object' && item.open) {
    // Open a styled inline element inside current paragraph
    const el = document.createElement(item.open);
    p.appendChild(el);
    _currentInlineEl = el;
  } else if (item && typeof item === 'object' && item.close) {
    // Close inline element
    _currentInlineEl = null;
  } else {
    // Plain character — append to inline element if open, else to paragraph
    const target = _currentInlineEl || p;
    target.appendChild(document.createTextNode(item));
  }

  currentCursor = currentEl.querySelector('p:last-child');
  if (currentCursor) currentCursor.classList.add('typing-cursor');

  scrollToBottom();
  setTimeout(typeNextChar, charDelay);
}

function startTyping() {
  if (isTyping) return;
  if (charDelay === 0) { instantFlush(); return; }
  isTyping = true;
  typeNextChar();
}

// ── Block type badge detection ───────────────────────────────────────────────
// ── Class icon mapping ──────────────────────────────────────────────
const _CLASS_ICONS = {
  barbarian: 'class_barbarian', bard:      'class_bard',
  cleric:    'class_cleric',    druid:     'class_druid',
  fighter:   'class_fighter',   monk:      'class_monk',
  paladin:   'class_paladin',   ranger:    'class_ranger',
  rogue:     'class_rogue',     sorcerer:  'class_sorcerer',
  warlock:   'class_warlock',   wizard:    'class_wizard',

function flushNewBlock() {
  // Finalise the current block and start a fresh one next time
  if (currentCursor && currentCursor.parentNode) {
    currentCursor.parentNode.removeChild(currentCursor);
    currentCursor = null;
  }
  // Add a soft divider if there was content
  if (currentEl) {
    const div = document.createElement('div');
    div.className = 'divider';
    div.textContent = '✦';
    textContent.appendChild(div);
  }
  currentEl = null;
}

// ── Instant flush: drain all pending chars synchronously ──────────────
// Called before inserting a non-DM block so the typewriter never gets
// interrupted mid-word. Renders all queued chars immediately, then
// stops the typewriter loop cleanly.
function instantFlush() {
  if (charQueue.length === 0) return;
  clearTimeout(idleTimer);
  const pending = charQueue.splice(0);  // atomically drain
  let flushInline = null;  // local inline tracker for this flush pass
  for (const item of pending) {
    if (item === '\n') {
      flushInline = null;
      if (!currentEl) getOrCreateBlock();
      const next = document.createElement('p');
      currentEl.appendChild(next);
    } else if (item && typeof item === 'object' && item.table) {
      flushInline = null;
      if (!currentEl) getOrCreateBlock();
      currentEl.appendChild(_buildTableNode(item.table));
    } else if (item && typeof item === 'object' && item.open) {
      const p = getOrCreateBlock();
      const el = document.createElement(item.open);
      p.appendChild(el);
      flushInline = el;
    } else if (item && typeof item === 'object' && item.close) {
      flushInline = null;
    } else {
      const p = getOrCreateBlock();
      const target = flushInline || p;
      target.appendChild(document.createTextNode(item));
    }
  }
  isTyping = false;
  _currentInlineEl = null;
  if (currentCursor) currentCursor.classList.remove('typing-cursor');
  currentCursor = currentEl ? currentEl.querySelector('p:last-child') : null;
}

// ── Shared: flush cursor and currentEl before inserting a non-DM block ──
function _flushForBlock() {
  instantFlush();  // finish any in-progress typewriter before inserting
  if (currentCursor) {
    currentCursor.classList.remove('typing-cursor');
    currentCursor = null;
  }
  currentEl = null;
  clearTimeout(idleTimer);
}

// ── Shared: after inserting a non-DM block, re-establish cursor below it ──
// If typing is still in progress, immediately open the next DM block so the
// cursor appears below the inserted block rather than going invisible.
function _reanchorCursor() {
  if ((isTyping || charQueue.length > 0) && !currentEl) {
    const p = getOrCreateBlock();
    currentCursor = p;
    currentCursor.classList.add('typing-cursor');
  }
  scrollToBottom();
}

// ── Dice block icon detection ─────────────────────────────────────────
function _diceRollIcon(text) {
  const t = text.toLowerCase();
  // Highest-stakes — check first
  if (/death save|death saving|critical hit|fumble/.test(t))             return 'dragon';
  // Spell
  if (/spell attack|concentration|cantrip|cast/.test(t))                 return 'spellbook';
  // Potion / medicine
  if (/potion|medicine|alchemist/.test(t))                               return 'potion';
  // Mystical sensing
  if (/insight|arcana|divination|perception/.test(t))                    return 'crystal_ball';
  // Combat
  if (/attack|vs ac|\bhit\b|\bmiss\b|slashing|piercing|bludgeoning|necrotic|radiant|fire|cold|lightning|damage/.test(t)) return 'attack';
  // Saving throws
  if (/saving throw|save dc|\bsave\b|con save|dex save|wis save|str save|int save|cha save/.test(t)) return 'shield';
  // Knowledge checks
  if (/investigation|history|nature|religion|survival/.test(t))          return 'scroll';
  // Social / physical skills
  if (/stealth|sleight|deception|persuasion|intimidation|performance|acrobatics|athletics/.test(t)) return 'dagger';
  // Healing
  if (/heal|restore|hit point|recover/.test(t))                          return 'heal';
  // Initiative
  if (/initiative/.test(t))                                              return 'timer';
  return null;
}

// ── Replay batch (reconnect / session resume) ─────────────────────────
function renderReplayBatch(items) {
  flushNewBlock();
  items.forEach(item => {
    if (!item) return;
    if (item.inspiration_award) {
      renderInspirationBlock(item.inspiration_award, item.reason || '');
      return;
    }
    if (item.milestone_award) {
      renderMilestoneBlock(item.milestone_award, item.label || 'Milestone', item.reason || '', true);
      return;
    }
    if (item.xp_award) {
      renderXpBlock(item.xp_award);
      return;
    }
    if (!item.text) return;
    if (item.action) {
      renderActionBlock(item.action, item.text, true);
    } else if (item.player) {
      renderPlayerBlock(item.player, item.text, true);
    } else if (item.npc) {
      renderNPCBlock(item.npc, item.text, true);
    } else if (item.dice) {
      renderDiceBlock(item.text, true);
    } else if (item.tutor) {
      renderTutorBlock(item.text, true);
    } else {
      const block = document.createElement('div');
      block.className = 'dm-block';
      block.style.opacity = '0.75';
      item.text.split('\n').forEach(line => {
        const p = document.createElement('p');
        _appendInlineSegments(p, _mdParse(line));
        block.appendChild(p);
      });
      textContent.appendChild(block);
    }
  });

  const div = document.createElement('div');
  div.className = 'divider';
  div.textContent = '✦';
  textContent.appendChild(div);

  scrollToBottom();
}

function clearDisplay(then) {
  // Fade out, wipe, fade back in, then call the callback.
  textContent.style.opacity = '0';
  setTimeout(() => {
    // Abort any in-progress typewriter
    charQueue        = [];
    isTyping         = false;
    _currentInlineEl = null;
    if (currentCursor && currentCursor.parentNode) {
      currentCursor.parentNode.removeChild(currentCursor);
    }
    currentCursor = null;
    currentEl     = null;
    clearTimeout(idleTimer);

    textContent.innerHTML = '';
    textScroll.scrollTop  = 0;
    userScrolledUp = false;
    textContent.style.opacity = '1';
    _hideProcessingIndicator();

    if (then) then();
  }, 370); // matches the CSS transition duration
}

function _showProcessingIndicator() {
  _hideProcessingIndicator(); // clear any existing one first
  const el = document.createElement('div');
  el.id = 'dm-processing-indicator';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('span');
    dot.className = 'proc-dot';
    el.appendChild(dot);
  }
  textContent.appendChild(el);
  scrollToBottom();
}

function _hideProcessingIndicator() {
  const el = document.getElementById('dm-processing-indicator');
  if (el) el.remove();
}

function handleIncomingText(text) {
  _hideProcessingIndicator();
  // Debounce block separation: if there was a gap > IDLE_GAP, new block
  const now = Date.now();
  if (now - lastChunkTime > IDLE_GAP && charQueue.length === 0 && !isTyping) {
    flushNewBlock();
  }
  lastChunkTime = now;

  // Reset idle timer
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    if (!isTyping && charQueue.length === 0) flushNewBlock();
  }, IDLE_GAP * 2);

  // Enqueue — preprocess markdown to typed segment items
  const cleaned = text
    .replace(/[\x00-\x08\x0b-\x1f\x7f]/g, '')  // strip control chars (keep \n \t)
    .replace(/\[[\d;?]*[a-zA-Z]/g, '')           // strip leftover CSI remnants
    .replace(/\r/g, '')
    .replace(/\t/g, '  ');
  for (const item of _mdParse(cleaned)) {
    charQueue.push(item);
  }

  startTyping();
}

function scrollToBottom() {
  if (!userScrolledUp) {
    textScroll.scrollTop = textScroll.scrollHeight;
  }
}

function renderReplay(text) {
  // Render historical text instantly (no typewriter) when browser reconnects.
  flushNewBlock();
  const cleaned = text
    .replace(/[\x00-\x08\x0b-\x1f\x7f]/g, '')
    .replace(/\[[\d;?]*[a-zA-Z]/g, '')
    .replace(/\r/g, '')
    .replace(/\t/g, '  ');
  if (!cleaned.trim()) return;

  const block = document.createElement('div');
  block.className = 'dm-block';
  block.style.opacity = '0.75';   // subtle visual distinction for historical text
  cleaned.split('\n').forEach(line => {
    const p = document.createElement('p');
    _appendInlineSegments(p, _mdParse(line));
    block.appendChild(p);
  });
  textContent.appendChild(block);

  // Add a divider after replay so live text starts fresh
  const div = document.createElement('div');
  div.className = 'divider';
  div.textContent = '✦';
  textContent.appendChild(div);

  scrollToBottom();
}

const _flashOverlay = document.getElementById('flash-overlay');
function triggerFlash(type) {
  _flashOverlay.classList.remove('flash-crit', 'flash-fumble');
  // Force reflow so the animation restarts cleanly
  void _flashOverlay.offsetWidth;
  _flashOverlay.classList.add(type === 'crit' ? 'flash-crit' : 'flash-fumble');
